<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ダンジョン</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=New+Tegomin&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --font-title: "New Tegomin", "Noto Serif JP", serif;
            --font-body: "Noto Sans JP", -apple-system, BlinkMacSystemFont, "Hiragino Sans", sans-serif;
        }

        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background: #ffffff;

            display: flex;
            flex-direction: column;
            align-items: center;
            touch-action: none;
            user-select: none;
        }

        .header, .footer {
            width: 600px;
            height: 200px;
            background: #605252;
            color: white;

            display: flex;
            align-items: center;
            justify-content: center;

            font-size: 20px;
            font-family: 'Noto Sans JP', sans-serif;
        }

        #maze {
            touch-action: none;
        }
        #START {
            position: absolute;

            left: 50%;
            top: 50%;

            transform: translate(-50%, -50%);
            cursor: pointer;
        }
        /* 真ん中 */
        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            background: black;
            display: block;
        }

        .header, .footer span {
            font-size: 30px;
            color: white;
            text-align: center;
            text-shadow: 1.5px 1.5px 0 #000, -1.5px -1.5px 0 #000,
              -1.5px 1.5px 0 #000, 1.5px -1.5px 0 #000,
              0px 1.5px 0 #000,  0 -1.5px 0 #000,
              -1.5px 0 0 #000, 1.5px 0 0 #000;
        }
        body {
    margin: 0;
    background: black;

    display: flex;
    flex-direction: column;
    align-items: center;

    height: 100vh;
}

#maze {
    width: min(100vw, 900px);
    aspect-ratio: 3 / 2;

    display: block;
}
    </style>
</head>
<body>
    <div class="header">
        <span id="description"></span>
    </div>
    <main>
        <canvas id="maze"></canvas>
        <img src="start.png" id="START" onclick="go()"><br>
        <img src="arrows.png" id="arrows" style="display: none;">
        <img src="hero0.png" id="hero0" style="display: none;">
        <img src="hero1.png" id="hero1" style="display: none;">
        <img src="hero2.png" id="hero2" style="display: none;">
        <img src="hero3.png" id="hero3" style="display: none;">
        <img src="alien0.png" id="alien0" style="display: none;">
        <img src="alien1.png" id="alien1" style="display: none;">
        <img src="alien2.png" id="alien2" style="display: none;">
        <img src="alien3.png" id="alien3" style="display: none;">
    </main>
    <div class="footer">
        <span>Dungeon</span>
    </div>
    <script src="script.js"></script>
</body>
</html>
