<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dungeon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=New+Tegomin&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --font-title: "New Tegomin", "Noto Serif JP", serif;
            --font-body: "Noto Sans JP", -apple-system, BlinkMacSystemFont, "Hiragino Sans", sans-serif;
        }

        body {
            font-family: var(--font-body);
            background: #c1c2c6;
            color: #333;
            text-align: center;
            padding: 50px;
        }
        h1 {
            font-family: var(--font-title);
            font-style: bold;
            font-size: 36px;
            margin-bottom: 20px;
        }
        h2 {
            font-family: var(--font-body);
            font-size: 24px;
            margin-bottom: 40px;
        }
        a img {
            transition: transform 0.3s ease;
        }
        a img:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <h1>ダンジョン</h1>
    <h2>ようこそ、ダンジョンへ！<br>敵を避けつつ右下まで進め！</h2>
    <a href="game.html"><img src="start.png" alt="スタート" width="50%"></a>
</body>
</html>
